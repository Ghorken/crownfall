name: crownfall
description: Crown Fall - A modified chess game with RPG elements
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.5+1
  shared_preferences: ^2.5.4
  audioplayers: ^6.6.0
  lottie: ^3.3.2
  flutter_animate: ^4.5.2
  google_fonts: ^8.0.2
  # Firebase - Online Multiplayer
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  generate: true
  uses-material-design: true
  assets:
    # PLACEHOLDER IMAGES - Sostituisci con i tuoi asset reali
    # Struttura attesa per i pezzi:
    # assets/images/pieces/{piece_id}_full.png  -> immagine a vita piena
    # assets/images/pieces/{piece_id}_half.png  -> immagine a metà vita
    # piece_id examples: pawn, rook, knight, bishop, queen, king
    # per pezzi nuovi: fighter, miner, rifleman, healer, etc.
    - assets/images/pieces/
    - assets/images/ui/
    - assets/images/skins/
    - assets/images/boards/
  # fonts:
    # Puoi aggiungere font custom qui
    # - family: MedievalFont
    #   fonts:
    #     - asset: assets/fonts/medieval.ttf

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  windows:
    generate: true
  macos:
    generate: true
  image_path: "assets/crownfall_icon.png"
  min_sdk_android: 21
